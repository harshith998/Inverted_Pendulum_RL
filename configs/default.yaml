environment:
  n_links_range: [2, 2]         # fixed 2-link for initial training
  cart_mass_range: [0.5, 3.0]   # kg
  link_length_range: [0.3, 1.2] # metres
  link_mass_range: [0.1, 2.0]   # kg
  rail_limit: 2.5               # metres, cart position clipped to [-rail_limit, rail_limit]
  max_force: 20.0               # Newtons, actuator control range
  timestep: 0.001               # MuJoCo integration timestep (seconds)
  frame_skip: 4                 # MuJoCo steps per environment step (effective dt = 0.004s)
  max_episode_steps: 1000
  termination_angle: 0.7854     # radians (~45 degrees), episode ends if any joint exceeds this

graph:
  node_feat_dim: 8   # [is_cart, is_joint, is_end, sin_theta, cos_theta, theta_dot, x, xdot]
  edge_feat_dim: 2   # [length, mass]

rewards:
  upright_weight: 1.0    # weight on sum of cos(theta_i) across all links
  alive_bonus: 0.1       # flat bonus per step for staying alive
  force_penalty: 0.001   # penalty on squared control force
  rail_penalty: 0.01     # penalty on squared cart displacement from centre

init:
  angle_noise: 0.05      # radians, uniform noise applied to each joint angle at reset
  vel_noise: 0.01        # rad/s or m/s, uniform noise applied to each velocity at reset

ppo:
  hidden_dim: 128
  n_layers: 3            # message-passing layers (MPNN) or attention layers (transformer)
  n_heads: 4             # attention heads — transformer only
  dropout: 0.1
  n_envs: 4              # parallel environments — 4× data diversity per update
  rollout_steps: 4096    # steps per env per update (total = rollout_steps * n_envs)
  n_epochs: 5            # reduced from 10 — fewer epochs keeps ratio fresh, less drift
  mini_batch_size: 256   # larger batch — more data per update supports this
  gamma: 0.99
  gae_lambda: 0.95       # GAE smoothing (1.0 = full MC return, 0.0 = pure TD)
  clip_epsilon: 0.2      # PPO surrogate clip range
  value_coef: 0.5        # weight on value loss
  entropy_coef: 0.02     # increased from 0.01 — keeps std from collapsing post-peak
  lr: 0.0001             # reduced from 3e-4 — slower but much more stable
  anneal_lr: true        # linearly decay lr → 0 over total_steps
  max_grad_norm: 0.5
  total_steps: 2000000   # total env steps across all parallel envs
  save_interval: 100000
  gnn_transformer:       # transformer-specific overrides (fewer heads/layers = more stable)
    n_heads: 2           # 4→2: each head sees 64-dim keys/queries (was 32), more capacity
    n_layers: 2          # 3→2: shallower = less gradient vanishing, faster convergence
    entropy_coef: 0.03   # slightly higher — transformer std tends to collapse faster

dqn:
  n_action_bins: 51        # discrete bins over [-max_force, max_force]
  hidden_dim: 64           # GNN and MLP hidden size
  n_mp_layers: 2           # GNN message passing layers
  replay_capacity: 100000
  batch_size: 64
  gamma: 0.99              # discount factor
  lr: 0.00005              # reduced from 1e-4 — slower but avoids Q-value divergence
  eps_start: 1.0           # epsilon-greedy start
  eps_end: 0.05            # epsilon-greedy floor
  eps_decay_steps: 150000  # increased from 50k — keeps exploration alive longer
  warmup_steps: 1000       # steps before any gradient updates
  update_freq: 4           # env steps between gradient updates
  target_update_freq: 1000 # steps between target network syncs
  weight_decay: 0.0001     # L2 regularization on all weights (now active)
  dropout: 0.1             # applied inside GNN message passing layers (now active)
  total_steps: 2000000     # increased from 500k — slower lr needs more steps
  log_interval: 1000
  save_interval: 100000
